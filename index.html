<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Fun Facts</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <section class="card">
    <h1>Random Fun Facts</h1>
    <p class="fact" id="factText">Press the button to reveal a surprising fact!</p>
    <div class="buttons">
      <button class="random-btn" id="newFactBtn">New Fact</button>
      <button class="share-btn" id="copyFactBtn">Copy Fact</button>
    </div>
    <p class="small">Facts are randomly selected from the list below and change every time you click.</p>
  </section>

  <script src="script.js"></script>
</body>
</html>
